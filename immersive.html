<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>روایت تاریخ ایران — نمای فیروزه‌ای</title>
  <meta name="description" content="مرور بصری و غنی تاریخ ایران با الهام از هنر و هویت ایرانی" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="immersive.css" />
</head>
<body>

  <!-- ===== STICKY HEADER ===== -->
  <header class="persian-header" id="persian-header">
    <div class="header-pattern" aria-hidden="true"></div>
    <div class="header-inner">
      <a href="index.html" class="brand-link">
        <span class="brand-emblem">☽</span>
        <div class="brand-text">
          <span class="brand-title">تاریخ ایران</span>
          <span class="brand-sub">روایت فیروزه‌ای</span>
        </div>
      </a>

      <div class="header-center">
        <div class="search-pill">
          <span class="search-icon-inner">🔍</span>
          <input type="search" id="imm-search" class="search-field" placeholder="جستجو در رویدادها..." aria-label="جستجو" />
        </div>
      </div>

      <div class="header-actions">
        <a href="index.html" class="btn-switch-view" title="نمای تایم‌لاین">
          <span>📋</span>
          <span class="btn-switch-label">نمای عمودی</span>
        </a>
        <button class="btn-theme-toggle" id="btn-theme-imm" title="تغییر تم" aria-label="تغییر تم">🌙</button>
      </div>
    </div>

    <!-- Era filter chips -->
    <div class="era-chips-bar" id="era-chips-bar" role="group" aria-label="فیلتر دوره تاریخی">
      <button class="era-chip active" data-era="all">همه دوره‌ها</button>
    </div>
  </header>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="persian-layout">

    <!-- LEFT PANEL: Event List -->
    <aside class="events-panel" id="events-panel">
      <div class="events-panel-inner" id="events-list">
        <!-- Populated by JS -->
      </div>
    </aside>

    <!-- RIGHT PANEL: Detail View -->
    <main class="detail-panel" id="detail-panel">
      <!-- Decorative Persian pattern overlay -->
      <div class="detail-pattern-overlay" aria-hidden="true"></div>

      <!-- Empty state -->
      <div class="empty-state hidden" id="empty-state">
        <div class="empty-emblem">☽</div>
        <p>رویداد تاریخی‌ای یافت نشد</p>
      </div>

      <!-- Detail Content -->
      <div class="detail-content" id="detail-content">

        <!-- Top: Era badge + date -->
        <div class="detail-meta" id="detail-meta">
          <span class="detail-era-badge" id="detail-era-badge"></span>
          <span class="detail-date" id="detail-date"></span>
        </div>

        <!-- Title -->
        <h1 class="detail-title" id="detail-title"></h1>

        <!-- Summary block -->
        <blockquote class="detail-summary" id="detail-summary"></blockquote>

        <!-- Decorative divider -->
        <div class="persian-divider" aria-hidden="true">
          <span class="divider-line"></span>
          <span class="divider-gem">◆</span>
          <span class="divider-line"></span>
        </div>

        <!-- Description -->
        <p class="detail-desc" id="detail-desc"></p>

        <!-- Tags -->
        <div class="detail-tags" id="detail-tags"></div>

        <!-- Two-column: Rulers + References -->
        <div class="detail-columns">

          <!-- Rulers -->
          <section class="rulers-section hidden" id="rulers-section">
            <h2 class="section-heading">
              <span class="section-heading-icon">👑</span>
              حاکمان برجسته
            </h2>
            <div class="rulers-grid" id="rulers-grid"></div>
          </section>

          <!-- References -->
          <section class="refs-section hidden" id="refs-section">
            <h2 class="section-heading">
              <span class="section-heading-icon">📚</span>
              منابع و مستندات
            </h2>
            <div class="refs-list" id="refs-list"></div>
          </section>

        </div>

        <!-- Navigation arrows -->
        <div class="detail-nav" id="detail-nav">
          <button class="detail-nav-btn" id="btn-prev-event" title="رویداد قبلی">
            <span>›</span>
            <span class="nav-btn-label">بعدی</span>
          </button>
          <span class="detail-nav-counter" id="nav-counter"></span>
          <button class="detail-nav-btn" id="btn-next-event" title="رویداد بعدی">
            <span class="nav-btn-label">قبلی</span>
            <span>‹</span>
          </button>
        </div>

      </div>
    </main>

  </div>

  <!-- Toast -->
  <div id="imm-toast-container" class="imm-toast-container" aria-live="polite"></div>

  <script src="immersive.js"></script>
</body>
</html>
